{% extends "base.html" %}
{% block title %}收支记账{% endblock %}
{% block content %}
<header class="page-header">
    <h1>收支记账</h1>
    <p class="subtitle">记录每一笔收支，掌握财务流向</p>
</header>

<div class="summary-cards" id="summary"></div>

<div class="quick-add-card">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">
        <button id="btn-expense" class="type-toggle active-expense" onclick="setType('expense')">支出</button>
        <button id="btn-income" class="type-toggle" onclick="setType('income')">收入</button>
    </div>
    <form id="record-form" style="margin:0;">
        <input type="hidden" id="type" value="expense">
        <input type="number" id="amount" placeholder="金额" step="0.01" min="0.01" autofocus
               style="flex:1;min-width:120px;font-size:1.125rem;font-weight:600;padding:10px 12px;">
        <select id="category_id" style="flex:1;min-width:140px;padding:10px 12px;"></select>
        <input type="date" id="date" style="flex:0;min-width:130px;padding:10px 12px;">
        <button type="submit" class="btn btn-primary" style="padding:10px 20px;">保存记录</button>
    </form>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;" id="quick-amounts">
        <button onclick="quickAmount(10)" class="chip">10</button>
        <button onclick="quickAmount(20)" class="chip">20</button>
        <button onclick="quickAmount(30)" class="chip">30</button>
        <button onclick="quickAmount(50)" class="chip">50</button>
        <button onclick="quickAmount(100)" class="chip">100</button>
        <button onclick="quickAmount(200)" class="chip">200</button>
        <button onclick="quickAmount(500)" class="chip">500</button>
        <input type="text" id="note" placeholder="备注（回车保存）" style="flex:1;min-width:100px;margin-left:4px;">
    </div>
</div>

<div class="section-header">账单记录</div>
<div id="records-container">
    <table id="records-table">
        <thead><tr><th>日期</th><th>分类</th><th>金额</th><th>备注</th><th>操作</th></tr></thead>
        <tbody></tbody>
    </table>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/finance.js?v=5"></script>{% endblock %}
