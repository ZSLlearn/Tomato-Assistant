{% extends "base.html" %}
{% block title %}个人助手 · 首页{% endblock %}
{% block content %}
<header class="page-header">
    <h1>仪表盘</h1>
    <p class="subtitle">今日概览，左侧 AI 助手可随时提问或执行操作</p>
</header>

<div class="summary-cards" id="dashboard-cards">
    <div class="card">
        <div class="value" id="dash-balance">--</div>
        <div class="label">本月结余</div>
    </div>
    <div class="card">
        <div class="value" id="dash-weight">--</div>
        <div class="label">最近体重</div>
    </div>
    <div class="card">
        <div class="value" id="dash-events">--</div>
        <div class="label">今日日程</div>
    </div>
    <div class="card">
        <div class="value" id="dash-notes">--</div>
        <div class="label">笔记总数</div>
    </div>
</div>

<div style="display:flex;gap:20px;flex-wrap:wrap;">
    <div style="flex:1;min-width:260px;">
        <div class="section-header">即将到来的日程</div>
        <ul id="upcoming-events" style="list-style:none;padding:0;"></ul>
    </div>
    <div style="flex:1;min-width:260px;">
        <div class="section-header">置顶笔记</div>
        <ul id="pinned-notes" style="list-style:none;padding:0;"></ul>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function refreshDashboard() {
    try {
        const now = new Date();
        const [finResp, healthResp, schedResp, memoResp] = await Promise.all([
            api('/finance/api/summary?year=' + now.getFullYear() + '&month=' + (now.getMonth()+1)),
            api('/health/api/dashboard'),
            api('/schedule/api/events?date_from=' + now.toISOString().slice(0,10)),
            api('/memo/api/notes')
        ]);
        if (finResp.code === 200) {
            document.getElementById('dash-balance').textContent = finResp.data.balance >= 0 ? '+¥' + finResp.data.balance.toFixed(2) : '-¥' + Math.abs(finResp.data.balance).toFixed(2);
        }
        if (healthResp.code === 200) {
            document.getElementById('dash-weight').textContent = (healthResp.data.weight || '--') + ' kg';
        }
        if (schedResp.code === 200) {
            document.getElementById('dash-events').textContent = schedResp.data.length;
            const ul = document.getElementById('upcoming-events');
            ul.innerHTML = '';
            if (schedResp.data.length === 0) {
                ul.innerHTML = '<li style="padding:8px 0;font-size:var(--text-sm);color:var(--muted);">今日暂无日程</li>';
            } else {
                schedResp.data.slice(0, 5).forEach(function(ev) {
                    var li = document.createElement('li');
                    li.style.cssText = 'padding:8px 0;border-bottom:1px solid var(--border-light);font-size:var(--text-sm);display:flex;gap:8px;';
                    li.innerHTML = '<span style="color:var(--muted);flex-shrink:0;">' + (ev.start_time || '') + '</span><span>' + ev.title + '</span>';
                    ul.appendChild(li);
                });
            }
        }
        if (memoResp.code === 200) {
            var notes = memoResp.data;
            document.getElementById('dash-notes').textContent = notes.length;
            var ul = document.getElementById('pinned-notes');
            ul.innerHTML = '';
            var pinned = notes.filter(function(n) { return n.is_pinned; });
            if (pinned.length === 0) {
                ul.innerHTML = '<li style="padding:8px 0;font-size:var(--text-sm);color:var(--muted);">暂无置顶笔记</li>';
            } else {
                pinned.slice(0, 5).forEach(function(n) {
                    var li = document.createElement('li');
                    li.style.cssText = 'padding:8px 0;border-bottom:1px solid var(--border-light);font-size:var(--text-sm);';
                    li.textContent = n.title;
                    ul.appendChild(li);
                });
            }
        }
    } catch (e) {
        console.error(e);
    }
}

document.addEventListener('DOMContentLoaded', refreshDashboard);
</script>
{% endblock %}
