<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}个人助手{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/">🏠 首页</a>
        <a href="/finance">💰 记账</a>
        <a href="/health">❤️ 健康</a>
        <a href="/schedule">📅 日程</a>
        <a href="/memo">📝 备忘录</a>
        <a href="/weather">🌤 天气</a>
        <a href="/settings">⚙️ 设置</a>
    </nav>
    <div class="layout">
        <aside class="ai-panel" id="ai-panel">
            <div class="ai-messages" id="ai-messages"></div>
            <div class="ai-input">
                <input type="text" id="ai-input" placeholder="对我说点什么...">
                <button onclick="sendMessage()">发送</button>
            </div>
        </aside>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/ai-chat.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
