<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}个人助手{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=6">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-item {{ 'active' if request.path == '/' else '' }}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l6-4.5L14 6"/><path d="M3 6.5v7h10v-7"/><path d="M6.5 13.5v-3.5h3v3.5"/></svg>
            <span>首页</span>
        </a>
        <a href="/finance" class="nav-item {{ 'active' if request.path.startswith('/finance') else '' }}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 4v8M5.5 6.5h5M5.5 8.5h3.5"/></svg>
            <span>记账</span>
        </a>
        <a href="/health" class="nav-item {{ 'active' if request.path.startswith('/health') else '' }}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13.5C3.5 10 1.5 7.5 1.5 5A3.5 3.5 0 018 3.5 3.5 3.5 0 0114.5 5c0 2.5-2 5-6.5 8.5z"/></svg>
            <span>健康</span>
        </a>
        <a href="/schedule" class="nav-item {{ 'active' if request.path.startswith('/schedule') else '' }}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="12" rx="1.5"/><path d="M1.5 6h13M4.5 1v3M11.5 1v3"/></svg>
            <span>日程</span>
        </a>
        <a href="/memo" class="nav-item {{ 'active' if request.path.startswith('/memo') else '' }}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 1.5h7l3.5 3.5v9.5a1 1 0 01-1 1H3a1 1 0 01-1-1V2.5a1 1 0 011-1z"/><path d="M10 1.5V5h3.5M5 8h6M5 10.5h4"/></svg>
            <span>备忘录</span>
        </a>
        <a href="/weather" class="nav-item {{ 'active' if request.path.startswith('/weather') else '' }}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6.5A3 3 0 018.5 3.5 3 3 0 0112 6c1.5.3 2.5 1.5 2.5 3a2.5 2.5 0 01-2.5 2.5H4.5A2.5 2.5 0 012 9c0-1.5 1-2.7 2.5-3"/><circle cx="4" cy="8.5" r="0.8" fill="currentColor" stroke="none"/></svg>
            <span>天气</span>
        </a>
        <a href="/settings" class="nav-item {{ 'active' if request.path.startswith('/settings') else '' }}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v1.5M8 13v1.5M2.5 8H1M15 8h-1.5M3.4 3.4l1.1 1.1M11.5 11.5l1.1 1.1M3.4 12.6l1.1-1.1M11.5 4.5l1.1-1.1"/></svg>
            <span>设置</span>
        </a>
    </nav>

    <div class="layout">
        <aside class="ai-panel" id="ai-panel">
            <div class="ai-header">
                <span class="ai-presence" title="AI 助手在线"></span>
                <span class="ai-header-label">AI 助手</span>
                <div style="flex:1;"></div>
                <select id="conv-selector" onchange="switchConversation(this.value)">
                    <option value="">新对话</option>
                </select>
                <button onclick="newConversation()" title="新建对话" style="background:none;border:none;color:var(--ai-muted);cursor:pointer;font-size:15px;padding:2px 5px;">+</button>
                <button onclick="renameConversation()" title="重命名" style="background:none;border:none;color:var(--ai-muted);cursor:pointer;font-size:12px;padding:2px 4px;">✎</button>
                <button onclick="deleteConversation()" title="删除对话" style="background:none;border:none;color:var(--ai-muted);cursor:pointer;font-size:12px;padding:2px 4px;">✕</button>
            </div>
            <div class="ai-messages" id="ai-messages"></div>
            <div class="ai-input-wrap">
                <input type="text" id="ai-input" placeholder="输入消息…" autocomplete="off">
                <button onclick="sendMessage()">发送</button>
            </div>
        </aside>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/common.js?v=6"></script>
    <script src="/static/js/ai-chat.js?v=6"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
